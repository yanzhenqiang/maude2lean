<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyCIC - Interactive Goal Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 14px;
      background-color: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #181825;
      border-bottom: 1px solid #313244;
    }
    .header h1 { font-size: 18px; color: #89b4fa; }
    .controls { display: flex; gap: 10px; align-items: center; }
    .controls select, .controls button {
      padding: 6px 12px;
      background-color: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }
    .controls select:hover, .controls button:hover { background-color: #45475a; }
    .controls select { min-width: 200px; }
    .main-content { display: flex; height: calc(100vh - 50px); }
    .code-panel { display: flex; flex-direction: column; border-right: 1px solid #313244; width: 50%; min-width: 300px; }
    .info-panel { flex: 1; display: flex; flex-direction: column; }
    .panel-header {
      padding: 8px 15px;
      background-color: #181825;
      color: #6c7086;
      font-size: 12px;
      text-transform: uppercase;
      border-bottom: 1px solid #313244;
    }
    .code-content { flex: 1; overflow-y: auto; padding: 5px 0; }
    .code-line { display: flex; padding: 1px 10px; cursor: pointer; }
    .code-line:hover { background-color: #252535; }
    .code-line.selected { background-color: #2a2a3d; }
    .line-num { color: #6c7086; width: 35px; text-align: right; margin-right: 10px; user-select: none; }
    .line-marker { color: #89b4fa; width: 15px; user-select: none; }
    .line-content { color: #cdd6f4; white-space: pre; }
    .info-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .sub-panel { flex: 1; display: flex; flex-direction: column; border-bottom: 1px solid #313244; }
    .sub-panel:last-child { border-bottom: none; }
    .sub-panel-header {
      padding: 6px 12px;
      background-color: #1e1e2e;
      color: #6c7086;
      font-size: 11px;
      text-transform: uppercase;
      border-bottom: 1px solid #313244;
    }
    .sub-panel-content { flex: 1; overflow-y: auto; padding: 10px; }
    .info-empty { color: #6c7086; font-style: italic; }
    .info-line { margin-bottom: 3px; word-wrap: break-word; }
    .goals-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #313244; }
    .hypothesis { color: #f9e2af; margin-bottom: 2px; padding-left: 10px; }
    .goal { color: #a6e3a1; padding-left: 10px; }
    .penrose-canvas { width: 100%; height: 100%; background-color: #181825; border-radius: 4px; }
    .log-entry { font-size: 12px; margin-bottom: 2px; }
    .log-info { color: #89b4fa; }
    .log-error { color: #f38ba8; }
    .log-success { color: #a6e3a1; }
    .status-bar {
      display: flex; gap: 15px; padding: 8px 15px;
      background-color: #181825; border-top: 1px solid #313244;
      font-size: 12px; color: #6c7086;
    }
    .loading, .error {
      display: flex; justify-content: center; align-items: center;
      height: 100%; font-size: 16px;
    }
    .loading { color: #89b4fa; }
    .error { color: #f38ba8; }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #1e1e2e; }
    ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 5px; }
    .resizer {
      width: 5px;
      background-color: #313244;
      cursor: col-resize;
      user-select: none;
      transition: background-color 0.2s;
    }
    .resizer:hover {
      background-color: #89b4fa;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>TinyCIC Goal Viewer</h1>
    <div class="controls">
      <select id="file-selector">
        <option value="">-- Select a file --</option>
      </select>
      <button id="btn-reload">Reload</button>
      <button id="btn-typecheck">TypeCheck</button>
    </div>
  </div>
  <div class="main-content">
    <div class="code-panel" id="code-panel">
      <div class="panel-header">Source</div>
      <div class="code-content" id="code-content"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="info-panel">
      <div class="panel-header">Goal / Penrose / Log</div>
      <div class="info-content" id="info-content">
        <div class="sub-panel">
          <div class="sub-panel-header">Goals</div>
          <div class="sub-panel-content" id="goals-panel"></div>
        </div>
        <div class="sub-panel">
          <div class="sub-panel-header">Penrose</div>
          <div class="sub-panel-content" id="penrose-panel"></div>
        </div>
        <div class="sub-panel">
          <div class="sub-panel-header">TypeCheck Log</div>
          <div class="sub-panel-content" id="log-panel"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="status-bar" id="status-bar"></div>

  <script type="module">
    const API_BASE = '/api';
    let state = {
      fileContent: [],
      selectedLine: 0,
      declarations: [],
      availableFiles: [],
      loading: false,
      error: null,
      goals: [],
      logs: [],
      currentFile: null,
      infoLines: [],
      penroseAvailable: false
    };

    const codeContent = document.getElementById('code-content');
    const goalsPanel = document.getElementById('goals-panel');
    const penrosePanel = document.getElementById('penrose-panel');
    const logPanel = document.getElementById('log-panel');
    const statusBar = document.getElementById('status-bar');
    const fileSelector = document.getElementById('file-selector');
    const resizer = document.getElementById('resizer');
    const codePanel = document.getElementById('code-panel');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function render() {
      if (state.loading) {
        codeContent.innerHTML = '<div class="loading">Loading...</div>';
        goalsPanel.innerHTML = '<div class="loading">Loading...</div>';
        penrosePanel.innerHTML = '';
        logPanel.innerHTML = '';
        return;
      }
      if (state.error) {
        codeContent.innerHTML = `<div class="error">${escapeHtml(state.error)}</div>`;
        goalsPanel.innerHTML = `<div class="error">${escapeHtml(state.error)}</div>`;
        penrosePanel.innerHTML = '';
        logPanel.innerHTML = '';
        return;
      }

      const lines = state.fileContent.length > 0 ? state.fileContent : [''];
      let codeHtml = '';
      for (let i = 0; i < lines.length; i++) {
        const isSelected = i === state.selectedLine;
        const cls = isSelected ? 'code-line selected' : 'code-line';
        const marker = isSelected ? '>' : ' ';
        codeHtml += `<div class="${cls}" data-line="${i}">
          <span class="line-num">${String(i + 1).padStart(3)}</span>
          <span class="line-marker">${marker}</span>
          <span class="line-content">${escapeHtml(lines[i])}</span>
        </div>`;
      }
      codeContent.innerHTML = codeHtml;

      renderGoals();
      renderPenrose();
      renderLogs();

      statusBar.innerHTML = `
        <span>Line ${state.selectedLine + 1}/${state.fileContent.length}</span>
        <span>|</span>
        <span>${state.declarations.length} declarations</span>
        <span>|</span>
        <span>${state.goals.length} goals</span>
      `;
    }

    function renderGoals() {
      if (state.infoLines && state.infoLines.length > 0) {
        let html = '';
        for (const line of state.infoLines) {
          const trimmed = line.trim();
          if (trimmed === '────────────────────') {
            html += `<div style="border-top: 1px solid #313244; margin: 8px 0;"></div>`;
          } else if (trimmed.startsWith('⊢')) {
            html += `<div class="goal">${escapeHtml(line)}</div>`;
          } else if (trimmed.startsWith('let')) {
            html += `<div style="color: #f9e2af;">${escapeHtml(line)}</div>`;
          } else if (trimmed.includes(':')) {
            html += `<div class="hypothesis">${escapeHtml(line)}</div>`;
          } else {
            html += `<div style="margin-bottom: 3px; word-wrap: break-word;">${escapeHtml(line)}</div>`;
          }
        }
        goalsPanel.innerHTML = html;
      } else if (state.goals.length === 0) {
        goalsPanel.innerHTML = '<div class="info-empty">Select a line to see goals</div>';
        return;
      } else {
        let html = '';
        for (let i = 0; i < state.goals.length; i++) {
          const goal = state.goals[i];
          html += `<div style="margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #313244;">`;
          html += `<div style="color: #fab387; font-weight: bold; margin-bottom: 5px;">Goal ${i + 1}</div>`;
          if (goal.hypotheses && goal.hypotheses.length > 0) {
            html += `<div style="color: #6c7086; font-size: 11px; margin-bottom: 3px;">Hypotheses:</div>`;
            for (const hyp of goal.hypotheses) {
              html += `<div class="hypothesis">${escapeHtml(hyp)}</div>`;
            }
          }
          html += `<div style="color: #6c7086; font-size: 11px; margin-bottom: 3px; margin-top: 5px;">Goal:</div>`;
          html += `<div class="goal">${escapeHtml(goal.goal || '')}</div>`;
          html += `</div>`;
        }
        goalsPanel.innerHTML = html;
      }
    }

    // Simplified Penrose-style geometry renderer
    // Inspired by https://penrose.cs.cmu.edu/ - declarative geometry diagrams
    
    function parseGeometryInfo() {
      const lines = state.fileContent;
      const currentLine = state.selectedLine;
      
      // Find the theorem declaration
      let theoremLine = -1;
      for (let i = currentLine; i >= 0; i--) {
        const trimmed = lines[i].trim();
        if (trimmed.startsWith('theorem ') || trimmed.startsWith('def ') || trimmed.startsWith('axiom ')) {
          theoremLine = i;
          break;
        }
      }
      
      if (theoremLine === -1) return null;
      
      const declLine = lines[theoremLine].trim();
      
      // Extract theorem name
      const nameMatch = declLine.match(/(?:theorem|def|axiom)\s+(\w+)/);
      const name = nameMatch ? nameMatch[1] : '';
      
      // Extract point parameters
      const points = [];
      const pointRegex = /\(\s*(\w+)\s*:\s*Point\s*\)/g;
      let match;
      while ((match = pointRegex.exec(declLine)) !== null) {
        points.push(match[1]);
      }
      
      // Extract line parameters
      const lineParams = [];
      const lineRegex = /\(\s*(\w+)\s*:\s*Line\s*\)/g;
      while ((match = lineRegex.exec(declLine)) !== null) {
        lineParams.push(match[1]);
      }
      
      // Determine geometry type
      let geomType = 'generic';
      const lowerName = name.toLowerCase();
      const lowerDecl = declLine.toLowerCase();
      
      if (lowerName.includes('butterfly')) geomType = 'butterfly';
      else if (lowerName.includes('triangle') || lowerDecl.includes('triangle')) geomType = 'triangle';
      else if (lowerName.includes('circle') || lowerDecl.includes('circle')) geomType = 'circle';
      else if (lowerName.includes('parallel')) geomType = 'parallel';
      else if (lowerName.includes('perpendicular')) geomType = 'perpendicular';
      else if (lowerName.includes('midpoint')) geomType = 'midpoint';
      else if (lowerName.includes('between')) geomType = 'segment';
      else if (lowerName.includes('collinear')) geomType = 'collinear';
      else if (lowerName.includes('rectangle')) geomType = 'rectangle';
      else if (lowerName.includes('isosceles')) geomType = 'isosceles';
      else if (lowerName.includes('equilateral')) geomType = 'equilateral';
      else if (lowerName.includes('angle')) geomType = 'angle';
      else if (points.length >= 3) geomType = 'triangle';
      else if (points.length === 2) geomType = 'segment';
      
      return { name, points, lineParams, geomType, declLine };
    }

    // Simple constraint-based layout (simplified Penrose-style)
    function solveLayout(elements, constraints, canvasW, canvasH) {
      // Initialize random positions
      const positions = {};
      for (const el of elements) {
        positions[el] = {
          x: canvasW/2 + (Math.random() - 0.5) * canvasW * 0.6,
          y: canvasH/2 + (Math.random() - 0.5) * canvasH * 0.6
        };
      }
      
      // Simple gradient descent for constraints
      for (let iter = 0; iter < 100; iter++) {
        for (const c of constraints) {
          if (c.type === 'coincident' && positions[c.a] && positions[c.b]) {
            // Make points coincide
            const mx = (positions[c.a].x + positions[c.b].x) / 2;
            const my = (positions[c.a].y + positions[c.b].y) / 2;
            positions[c.a].x = mx;
            positions[c.a].y = my;
            positions[c.b].x = mx;
            positions[c.b].y = my;
          }
          else if (c.type === 'onCircle' && positions[c.point] && positions[c.center]) {
            // Place point on circle
            const dx = positions[c.point].x - positions[c.center].x;
            const dy = positions[c.point].y - positions[c.center].y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            const targetR = c.radius || 80;
            positions[c.point].x = positions[c.center].x + dx * targetR / dist;
            positions[c.point].y = positions[c.center].y + dy * targetR / dist;
          }
          else if (c.type === 'collinear' && positions[c.a] && positions[c.b] && positions[c.c]) {
            // Place c on line ab
            const ax = positions[c.a].x, ay = positions[c.a].y;
            const bx = positions[c.b].x, by = positions[c.b].y;
            const cx = positions[c.c].x, cy = positions[c.c].y;
            // Project c onto line ab
            const abx = bx - ax, aby = by - ay;
            const acx = cx - ax, acy = cy - ay;
            const abLen2 = abx*abx + aby*aby;
            const t = (acx*abx + acy*aby) / (abLen2 || 1);
            positions[c.c].x = ax + t * abx;
            positions[c.c].y = ay + t * aby;
          }
          else if (c.type === 'midpoint' && positions[c.a] && positions[c.b] && positions[c.m]) {
            // Place m at midpoint of ab
            positions[c.m].x = (positions[c.a].x + positions[c.b].x) / 2;
            positions[c.m].y = (positions[c.a].y + positions[c.b].y) / 2;
          }
          else if (c.type === 'angle' && positions[c.vertex] && positions[c.a] && positions[c.b]) {
            // Spread rays from vertex
            const vx = positions[c.vertex].x, vy = positions[c.vertex].y;
            const angle = c.value || Math.PI / 3;
            const len = c.length || 80;
            positions[c.a].x = vx + len * Math.cos(-angle/2);
            positions[c.a].y = vy + len * Math.sin(-angle/2);
            positions[c.b].x = vx + len * Math.cos(angle/2);
            positions[c.b].y = vy + len * Math.sin(angle/2);
          }
        }
      }
      
      return positions;
    }

    function generatePenroseSVG(geomInfo) {
      if (!geomInfo) return '';
      
      const { name, points, lineParams, geomType } = geomInfo;
      const W = 400, H = 300;
      
      // Define elements and constraints based on geometry type
      let elements = [];
      let constraints = [];
      let shapes = []; // {type: 'circle'|'line'|'polygon', points: [...], style: {}}
      
      switch (geomType) {
        case 'butterfly': {
          // Butterfly theorem: Circle with center O, chord PQ, midpoint M, chords AB and CD through M
          elements = ['O', 'P', 'Q', 'M', 'A', 'B', 'C', 'D', 'X', 'Y'];
          constraints = [
            {type: 'onCircle', point: 'P', center: 'O', radius: 80},
            {type: 'onCircle', point: 'Q', center: 'O', radius: 80},
            {type: 'onCircle', point: 'A', center: 'O', radius: 80},
            {type: 'onCircle', point: 'B', center: 'O', radius: 80},
            {type: 'onCircle', point: 'C', center: 'O', radius: 80},
            {type: 'onCircle', point: 'D', center: 'O', radius: 80},
            {type: 'midpoint', a: 'P', b: 'Q', m: 'M'},
            {type: 'collinear', a: 'A', b: 'M', c: 'B'},
            {type: 'collinear', a: 'C', b: 'M', c: 'D'},
            {type: 'collinear', a: 'A', b: 'D', c: 'X'},
            {type: 'collinear', a: 'B', b: 'C', c: 'Y'},
            {type: 'collinear', a: 'X', b: 'Y', c: 'M'},
          ];
          shapes = [
            {type: 'circle', center: 'O', radius: 80, style: {stroke: '#89b4fa', width: 2}},
            {type: 'segment', points: ['P', 'Q'], style: {stroke: '#a6e3a1', width: 1.5}},
            {type: 'segment', points: ['A', 'B'], style: {stroke: '#6c7086', width: 1, dash: '4'}},
            {type: 'segment', points: ['C', 'D'], style: {stroke: '#6c7086', width: 1, dash: '4'}},
            {type: 'segment', points: ['A', 'D'], style: {stroke: '#f9e2af', width: 1}},
            {type: 'segment', points: ['B', 'C'], style: {stroke: '#f9e2af', width: 1}},
          ];
          break;
        }
        case 'triangle': {
          elements = points.slice(0, 3);
          if (elements.length < 3) elements = ['A', 'B', 'C'];
          shapes = [
            {type: 'polygon', points: elements, style: {stroke: '#89b4fa', width: 2, fill: 'none'}}
          ];
          break;
        }
        case 'circle': {
          elements = ['O', ...points.slice(0, 1)];
          if (elements.length < 2) elements = ['O', 'P'];
          constraints = [
            {type: 'onCircle', point: elements[1], center: 'O', radius: 80}
          ];
          shapes = [
            {type: 'circle', center: 'O', radius: 80, style: {stroke: '#89b4fa', width: 2}}
          ];
          break;
        }
        case 'parallel': {
          elements = lineParams.slice(0, 2);
          if (elements.length < 2) elements = ['l', 'm'];
          shapes = [
            {type: 'line', points: ['l1', 'l2'], style: {stroke: '#89b4fa', width: 2}},
            {type: 'line', points: ['m1', 'm2'], style: {stroke: '#89b4fa', width: 2}}
          ];
          break;
        }
        case 'perpendicular': {
          elements = ['P', 'A', 'B'];
          constraints = [
            {type: 'angle', vertex: 'P', a: 'A', b: 'B', value: Math.PI/2}
          ];
          shapes = [
            {type: 'segment', points: ['P', 'A'], style: {stroke: '#89b4fa', width: 2}},
            {type: 'segment', points: ['P', 'B'], style: {stroke: '#89b4fa', width: 2}},
            {type: 'rightAngle', vertex: 'P', a: 'A', b: 'B', style: {stroke: '#f9e2af', width: 1.5}}
          ];
          break;
        }
        case 'midpoint': {
          elements = points.slice(0, 3);
          if (elements.length < 3) elements = ['A', 'B', 'M'];
          constraints = [
            {type: 'midpoint', a: elements[0], b: elements[1], m: elements[2]}
          ];
          shapes = [
            {type: 'segment', points: [elements[0], elements[1]], style: {stroke: '#89b4fa', width: 2}}
          ];
          break;
        }
        case 'segment': {
          elements = points.slice(0, 2);
          if (elements.length < 2) elements = ['A', 'B'];
          shapes = [
            {type: 'segment', points: elements, style: {stroke: '#89b4fa', width: 2}}
          ];
          break;
        }
        case 'collinear': {
          elements = points.slice(0, 4);
          if (elements.length < 3) elements = ['A', 'B', 'C'];
          constraints = [
            {type: 'collinear', a: elements[0], b: elements[1], c: elements[2]}
          ];
          shapes = [
            {type: 'line', points: [elements[0], elements[elements.length-1]], style: {stroke: '#89b4fa', width: 2}}
          ];
          break;
        }
        case 'rectangle': {
          elements = points.slice(0, 4);
          if (elements.length < 4) elements = ['A', 'B', 'C', 'D'];
          shapes = [
            {type: 'polygon', points: elements, style: {stroke: '#89b4fa', width: 2, fill: 'none'}}
          ];
          break;
        }
        case 'angle': {
          elements = points.slice(0, 3);
          if (elements.length < 3) elements = ['A', 'B', 'C'];
          shapes = [
            {type: 'segment', points: [elements[1], elements[0]], style: {stroke: '#89b4fa', width: 2}},
            {type: 'segment', points: [elements[1], elements[2]], style: {stroke: '#89b4fa', width: 2}},
            {type: 'arc', center: elements[1], start: elements[0], end: elements[2], style: {stroke: '#f9e2af', width: 1.5}}
          ];
          break;
        }
        default: {
          elements = points.length > 0 ? points : ['A', 'B', 'C'];
        }
      }
      
      // Solve layout
      const positions = solveLayout(elements, constraints, W, H);
      
      // Generate SVG
      let svg = `<svg class="penrose-canvas" viewBox="0 0 ${W} ${H}">`;
      svg += `<rect width="${W}" height="${H}" fill="#181825"/>`;
      svg += `<text x="${W/2}" y="20" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="bold">${escapeHtml(name)}</text>`;
      
      // Draw shapes
      for (const shape of shapes) {
        if (shape.type === 'circle') {
          const c = positions[shape.center] || {x: W/2, y: H/2};
          svg += `<circle cx="${c.x}" cy="${c.y}" r="${shape.radius}" fill="none" stroke="${shape.style.stroke}" stroke-width="${shape.style.width}"/>`;
        }
        else if (shape.type === 'segment') {
          const p1 = positions[shape.points[0]] || {x: W/3, y: H/2};
          const p2 = positions[shape.points[1]] || {x: 2*W/3, y: H/2};
          const dash = shape.style.dash ? ` stroke-dasharray="${shape.style.dash}"` : '';
          svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${shape.style.stroke}" stroke-width="${shape.style.width}"${dash}/>`;
        }
        else if (shape.type === 'line') {
          const p1 = positions[shape.points[0]] || {x: margin, y: H/2};
          const p2 = positions[shape.points[1]] || {x: W-margin, y: H/2};
          svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${shape.style.stroke}" stroke-width="${shape.style.width}"/>`;
        }
        else if (shape.type === 'polygon') {
          const pts = shape.points.map(p => {
            const pos = positions[p] || {x: W/2, y: H/2};
            return `${pos.x},${pos.y}`;
          }).join(' ');
          svg += `<polygon points="${pts}" fill="${shape.style.fill || 'none'}" stroke="${shape.style.stroke}" stroke-width="${shape.style.width}"/>`;
        }
        else if (shape.type === 'arc') {
          const c = positions[shape.center] || {x: W/2, y: H/2};
          const s = positions[shape.start] || {x: W/2-30, y: H/2};
          const e = positions[shape.end] || {x: W/2+30, y: H/2};
          const r = 30;
          svg += `<path d="M ${s.x} ${s.y} A ${r} ${r} 0 0 1 ${e.x} ${e.y}" fill="none" stroke="${shape.style.stroke}" stroke-width="${shape.style.width}"/>`;
        }
        else if (shape.type === 'rightAngle') {
          const v = positions[shape.vertex] || {x: W/2, y: H/2};
          const a = positions[shape.a] || {x: W/2, y: H/2-30};
          const b = positions[shape.b] || {x: W/2+30, y: H/2};
          const size = 12;
          // Calculate direction vectors
          const dax = a.x - v.x, day = a.y - v.y;
          const dbx = b.x - v.x, dby = b.y - v.y;
          const la = Math.sqrt(dax*dax + day*day) || 1;
          const lb = Math.sqrt(dbx*dbx + dby*dby) || 1;
          const ux = dax/la, uy = day/la;
          const vx_ = dbx/lb, vy_ = dby/lb;
          const p1x = v.x + size * ux, p1y = v.y + size * uy;
          const p2x = v.x + size * ux + size * vx_, p2y = v.y + size * uy + size * vy_;
          const p3x = v.x + size * vx_, p3y = v.y + size * vy_;
          svg += `<polyline points="${p1x},${p1y} ${p2x},${p2y} ${p3x},${p3y}" fill="none" stroke="${shape.style.stroke}" stroke-width="${shape.style.width}"/>`;
        }
      }
      
      // Draw points and labels
      for (const el of elements) {
        const pos = positions[el];
        if (!pos) continue;
        svg += `<circle cx="${pos.x}" cy="${pos.y}" r="4" fill="#f38ba8"/>`;
        svg += `<text x="${pos.x}" y="${pos.y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${el}</text>`;
      }
      
      svg += '</svg>';
      return svg;
    }

    function renderPenrose() {
      const isGeometryFile = (state.currentFile || '').toLowerCase().includes('geometry');
      
      if (!isGeometryFile) {
        penrosePanel.innerHTML = '<div class="info-empty">Penrose visualization available for geometry files</div>';
        return;
      }
      
      if (!state.penroseAvailable) {
        penrosePanel.innerHTML = '<div class="info-empty">Select a theorem line to see Penrose visualization</div>';
        return;
      }

      const geomInfo = parseGeometryInfo();
      const svg = generatePenroseSVG(geomInfo);
      
      if (svg) {
        penrosePanel.innerHTML = svg;
      } else {
        penrosePanel.innerHTML = '<div class="info-empty">Could not parse geometry information</div>';
      }
    }

    function renderLogs() {
      if (state.logs.length === 0) {
        logPanel.innerHTML = '<div class="info-empty">Click TypeCheck to run type checking</div>';
        return;
      }

      let html = '';
      for (const log of state.logs) {
        const cls = log.type === 'error' ? 'log-error' : log.type === 'success' ? 'log-success' : 'log-info';
        html += `<div class="log-entry ${cls}">${escapeHtml(log.message)}</div>`;
      }
      logPanel.innerHTML = html;
    }

    function addLog(message, type = 'info') {
      state.logs.push({ message, type });
      if (state.logs.length > 100) state.logs.shift();
      renderLogs();
    }

    function clearLogs() {
      state.logs = [];
      renderLogs();
    }

    async function loadAvailableFiles() {
      try {
        const res = await fetch(`${API_BASE}/list-files`);
        if (res.ok) {
          const data = await res.json();
          state.availableFiles = data.files || [];
          
          fileSelector.innerHTML = '<option value="">-- Select a file --</option>';
          for (const file of state.availableFiles) {
            const opt = document.createElement('option');
            opt.value = file;
            opt.textContent = file;
            fileSelector.appendChild(opt);
          }
        }
      } catch (e) {
        console.error('Failed to load file list:', e);
      }
    }

    async function loadFile(targetPath) {
      state.loading = true;
      clearLogs();
      render();

      try {
        if (targetPath) {
          const res = await fetch(`/api/file?path=${encodeURIComponent(targetPath)}`);
          if (res.ok) {
            const content = await res.text();
            state.fileContent = content.split('\n');
            state.selectedLine = 0;
            state.error = null;
            state.currentFile = targetPath;
            addLog(`Loaded file: ${targetPath}`, 'success');
          } else {
            state.error = `Cannot load file: ${targetPath}`;
            addLog(`Error loading file: ${targetPath}`, 'error');
          }

          const loadRes = await fetch(`${API_BASE}/load`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: targetPath, dependencies: [] })
          });
          if (loadRes.ok) {
            const data = await loadRes.json();
            if (data.success) {
              addLog('File loaded successfully', 'success');
            } else {
              addLog(`Warning: ${data.error || 'File may have errors'}`, 'error');
            }
          }
        } else {
          state.fileContent = [
            '-- Select a .cic file from the dropdown above',
            '',
            'Available commands:',
            '  j/k or Arrow Up/Down: Move cursor',
            '  Click on a line: Select line',
            '',
            'The Goals panel will show type information',
            'for the selected line.'
          ];
          state.error = null;
          state.currentFile = null;
        }

        const envRes = await fetch(`${API_BASE}/env`);
        if (envRes.ok) {
          const data = await envRes.json();
          state.declarations = data.declarations || [];
          addLog(`Loaded ${state.declarations.length} declarations`, 'info');
        }

        await fetchLineInfo(state.selectedLine);
      } catch (e) {
        state.error = e.message;
        addLog(`Error: ${e.message}`, 'error');
      }

      state.loading = false;
      render();
      scrollToSelected();
    }

    async function fetchLineInfo(lineNum) {
      try {
        let url = `${API_BASE}/line-info?line=${lineNum}`;
        if (state.currentFile) {
          url += `&file=${encodeURIComponent(state.currentFile)}`;
        }
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          state.goals = data.goals || [];
          state.penroseAvailable = data.penrose_available || false;
          state.infoLines = data.info || [];
          if (state.goals.length === 0 && state.infoLines.length === 0) {
            state.goals = [{
              hypotheses: [`Line ${lineNum + 1} selected`],
              goal: `Type information for line ${lineNum + 1}`
            }];
          }
        } else {
          state.goals = [];
          state.penroseAvailable = false;
          state.infoLines = [];
        }
      } catch (e) {
        state.goals = [];
        state.penroseAvailable = false;
        state.infoLines = [];
      }
    }

    async function runTypeCheck() {
      const target = fileSelector.value;
      if (!target) {
        addLog('Please select a file first', 'error');
        return;
      }

      clearLogs();
      addLog(`Running type check on: ${target}`, 'info');

      try {
        const res = await fetch(`${API_BASE}/load`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target, dependencies: [] })
        });

        if (res.ok) {
          const data = await res.json();
          if (data.success) {
            addLog('Type check passed!', 'success');
            addLog('All declarations are valid', 'success');
          } else {
            addLog(`Type check failed: ${data.error || 'Unknown error'}`, 'error');
          }
        } else {
          addLog('Failed to run type check', 'error');
        }
      } catch (e) {
        addLog(`Type check error: ${e.message}`, 'error');
      }
    }

    function scrollToSelected() {
      const el = codeContent.querySelector('.selected');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function initResizer() {
      let isResizing = false;
      
      resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        
        const containerRect = document.querySelector('.main-content').getBoundingClientRect();
        const newWidth = e.clientX - containerRect.left;
        const minWidth = 300;
        const maxWidth = containerRect.width - 300;
        
        if (newWidth > minWidth && newWidth < maxWidth) {
          codePanel.style.width = newWidth + 'px';
          codePanel.style.flex = '0 0 auto';
        }
      });
      
      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    }

    fileSelector.addEventListener('change', (e) => {
      const file = e.target.value;
      if (file) {
        const url = new URL(window.location);
        url.searchParams.set('target', file);
        window.history.pushState({}, '', url);
        loadFile(file);
      }
    });

    codeContent.addEventListener('click', async (e) => {
      const line = e.target.closest('.code-line');
      if (line) {
        state.selectedLine = parseInt(line.dataset.line);
        await fetchLineInfo(state.selectedLine);
        render();
        scrollToSelected();
      }
    });

    document.addEventListener('keydown', async (e) => {
      if (e.key === 'ArrowUp' || e.key === 'k') {
        if (state.selectedLine > 0) {
          state.selectedLine--;
          await fetchLineInfo(state.selectedLine);
          render();
          scrollToSelected();
        }
      } else if (e.key === 'ArrowDown' || e.key === 'j') {
        if (state.selectedLine < state.fileContent.length - 1) {
          state.selectedLine++;
          await fetchLineInfo(state.selectedLine);
          render();
          scrollToSelected();
        }
      }
    });

    document.getElementById('btn-reload').addEventListener('click', () => {
      const params = new URLSearchParams(window.location.search);
      const target = params.get('target');
      if (target) loadFile(target);
    });

    document.getElementById('btn-typecheck').addEventListener('click', runTypeCheck);

    loadAvailableFiles().then(() => {
      const params = new URLSearchParams(window.location.search);
      let target = params.get('target');
      
      if (!target) {
        const geometryFile = state.availableFiles.find(f => f.toLowerCase().includes('geometry'));
        if (geometryFile) {
          target = geometryFile;
          fileSelector.value = target;
        }
      } else {
        fileSelector.value = target;
      }
      
      loadFile(target);
      initResizer();
    });
  </script>
</body>
</html>
