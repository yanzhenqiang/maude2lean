<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyCIC - Interactive Goal Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 14px;
      background-color: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #181825;
      border-bottom: 1px solid #313244;
    }
    .header h1 { font-size: 18px; color: #89b4fa; }
    .controls { display: flex; gap: 10px; align-items: center; }
    .controls select, .controls button {
      padding: 6px 12px;
      background-color: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }
    .controls select:hover, .controls button:hover { background-color: #45475a; }
    .controls select { min-width: 200px; }
    .main-content { display: flex; height: calc(100vh - 50px); }
    .code-panel { flex: 0 0 55%; border-right: 1px solid #313244; display: flex; flex-direction: column; }
    .info-panel { flex: 1; display: flex; flex-direction: column; }
    .panel-header {
      padding: 8px 15px;
      background-color: #181825;
      color: #6c7086;
      font-size: 12px;
      text-transform: uppercase;
      border-bottom: 1px solid #313244;
    }
    .code-content { flex: 1; overflow-y: auto; padding: 5px 0; }
    .code-line { display: flex; padding: 1px 10px; cursor: pointer; }
    .code-line:hover { background-color: #252535; }
    .code-line.selected { background-color: #2a2a3d; }
    .line-num { color: #6c7086; width: 35px; text-align: right; margin-right: 10px; user-select: none; }
    .line-marker { color: #89b4fa; width: 15px; user-select: none; }
    .line-content { color: #cdd6f4; white-space: pre; }
    .info-content { flex: 1; overflow-y: auto; padding: 10px 15px; }
    .info-empty { color: #6c7086; font-style: italic; }
    .info-line { margin-bottom: 3px; word-wrap: break-word; }
    .goals-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #313244; }
    .hypothesis { color: #f9e2af; margin-bottom: 2px; padding-left: 10px; }
    .goal { color: #a6e3a1; padding-left: 10px; }
    .status-bar {
      display: flex; gap: 15px; padding: 8px 15px;
      background-color: #181825; border-top: 1px solid #313244;
      font-size: 12px; color: #6c7086;
    }
    .loading, .error {
      display: flex; justify-content: center; align-items: center;
      height: 100%; font-size: 16px;
    }
    .loading { color: #89b4fa; }
    .error { color: #f38ba8; }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #1e1e2e; }
    ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>TinyCIC Goal Viewer</h1>
    <div class="controls">
      <select id="file-selector">
        <option value="">-- Select a file --</option>
      </select>
      <button id="btn-reload">Reload</button>
    </div>
  </div>
  <div class="main-content">
    <div class="code-panel">
      <div class="panel-header">Source</div>
      <div class="code-content" id="code-content"></div>
    </div>
    <div class="info-panel">
      <div class="panel-header">Goals / Types</div>
      <div class="info-content" id="info-content"></div>
    </div>
  </div>
  <div class="status-bar" id="status-bar"></div>

  <script type="module">
    const API_BASE = '/api';
    let state = {
      fileContent: [],
      selectedLine: 0,
      declarations: [],
      availableFiles: [],
      loading: false,
      error: null
    };

    const codeContent = document.getElementById('code-content');
    const infoContent = document.getElementById('info-content');
    const statusBar = document.getElementById('status-bar');
    const fileSelector = document.getElementById('file-selector');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function render() {
      if (state.loading) {
        codeContent.innerHTML = '<div class="loading">Loading...</div>';
        infoContent.innerHTML = '';
        return;
      }
      if (state.error) {
        codeContent.innerHTML = `<div class="error">${escapeHtml(state.error)}</div>`;
        infoContent.innerHTML = '';
        return;
      }

      const lines = state.fileContent.length > 0 ? state.fileContent : [''];
      let codeHtml = '';
      for (let i = 0; i < lines.length; i++) {
        const isSelected = i === state.selectedLine;
        const cls = isSelected ? 'code-line selected' : 'code-line';
        const marker = isSelected ? '>' : ' ';
        codeHtml += `<div class="${cls}" data-line="${i}">
          <span class="line-num">${String(i + 1).padStart(3)}</span>
          <span class="line-marker">${marker}</span>
          <span class="line-content">${escapeHtml(lines[i])}</span>
        </div>`;
      }
      codeContent.innerHTML = codeHtml;

      infoContent.innerHTML = state.declarations.length > 0
        ? `<div class="info-line">${state.declarations.length} declarations</div>`
        : '<div class="info-empty">No declarations</div>';

      statusBar.innerHTML = `
        <span>Line ${state.selectedLine + 1}/${state.fileContent.length}</span>
        <span>|</span>
        <span>${state.declarations.length} declarations</span>
      `;
    }

    async function loadAvailableFiles() {
      try {
        const res = await fetch(`${API_BASE}/list-files`);
        if (res.ok) {
          const data = await res.json();
          state.availableFiles = data.files || [];
          
          fileSelector.innerHTML = '<option value="">-- Select a file --</option>';
          for (const file of state.availableFiles) {
            const opt = document.createElement('option');
            opt.value = file;
            opt.textContent = file;
            fileSelector.appendChild(opt);
          }
        }
      } catch (e) {
        console.error('Failed to load file list:', e);
      }
    }

    async function loadFile(targetPath) {
      state.loading = true;
      render();

      try {
        if (targetPath) {
          const res = await fetch(`/api/file?path=${encodeURIComponent(targetPath)}`);
          if (res.ok) {
            const content = await res.text();
            state.fileContent = content.split('\n');
            state.selectedLine = 0;
            state.error = null;
          } else {
            state.error = `Cannot load file: ${targetPath}`;
          }
        } else {
          state.fileContent = [
            '-- Select a .cic file from the dropdown above',
            '',
            'Available commands:',
            '  j/k or Arrow Up/Down: Move cursor',
            '  Click on a line: Select line',
            '',
            'The Goals/Types panel will show type information',
            'for the selected line.'
          ];
          state.error = null;
        }

        const envRes = await fetch(`${API_BASE}/env`);
        if (envRes.ok) {
          const data = await envRes.json();
          state.declarations = data.declarations || [];
        }
      } catch (e) {
        state.error = e.message;
      }

      state.loading = false;
      render();
      scrollToSelected();
    }

    function scrollToSelected() {
      const el = codeContent.querySelector('.selected');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    fileSelector.addEventListener('change', (e) => {
      const file = e.target.value;
      if (file) {
        const url = new URL(window.location);
        url.searchParams.set('target', file);
        window.history.pushState({}, '', url);
        loadFile(file);
      }
    });

    codeContent.addEventListener('click', (e) => {
      const line = e.target.closest('.code-line');
      if (line) {
        state.selectedLine = parseInt(line.dataset.line);
        render();
        scrollToSelected();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key === 'k') {
        if (state.selectedLine > 0) {
          state.selectedLine--;
          render();
          scrollToSelected();
        }
      } else if (e.key === 'ArrowDown' || e.key === 'j') {
        if (state.selectedLine < state.fileContent.length - 1) {
          state.selectedLine++;
          render();
          scrollToSelected();
        }
      }
    });

    document.getElementById('btn-reload').addEventListener('click', () => {
      const params = new URLSearchParams(window.location.search);
      const target = params.get('target');
      if (target) loadFile(target);
    });

    // Initialize
    loadAvailableFiles().then(() => {
      const params = new URLSearchParams(window.location.search);
      const target = params.get('target');
      if (target) {
        fileSelector.value = target;
        loadFile(target);
      } else {
        loadFile(null);
      }
    });
  </script>
</body>
</html>
