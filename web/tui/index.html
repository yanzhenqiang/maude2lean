<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyCIC - Interactive Goal Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 14px;
      background-color: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #181825;
      border-bottom: 1px solid #313244;
    }
    .header h1 { font-size: 18px; color: #89b4fa; }
    .controls { display: flex; gap: 10px; align-items: center; }
    .controls select, .controls button {
      padding: 6px 12px;
      background-color: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }
    .controls select:hover, .controls button:hover { background-color: #45475a; }
    .controls select { min-width: 200px; }
    .main-content { display: flex; height: calc(100vh - 50px); }
    .code-panel { display: flex; flex-direction: column; border-right: 1px solid #313244; width: 50%; min-width: 300px; }
    .info-panel { flex: 1; display: flex; flex-direction: column; }
    .panel-header {
      padding: 8px 15px;
      background-color: #181825;
      color: #6c7086;
      font-size: 12px;
      text-transform: uppercase;
      border-bottom: 1px solid #313244;
    }
    .code-content { flex: 1; overflow-y: auto; padding: 5px 0; }
    .code-line { display: flex; padding: 1px 10px; cursor: pointer; }
    .code-line:hover { background-color: #252535; }
    .code-line.selected { background-color: #2a2a3d; }
    .line-num { color: #6c7086; width: 35px; text-align: right; margin-right: 10px; user-select: none; }
    .line-marker { color: #89b4fa; width: 15px; user-select: none; }
    .line-content { color: #cdd6f4; white-space: pre; }
    .info-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .sub-panel { flex: 1; display: flex; flex-direction: column; border-bottom: 1px solid #313244; }
    .sub-panel:last-child { border-bottom: none; }
    .sub-panel-header {
      padding: 6px 12px;
      background-color: #1e1e2e;
      color: #6c7086;
      font-size: 11px;
      text-transform: uppercase;
      border-bottom: 1px solid #313244;
    }
    .sub-panel-content { flex: 1; overflow-y: auto; padding: 10px; }
    .info-empty { color: #6c7086; font-style: italic; }
    .info-line { margin-bottom: 3px; word-wrap: break-word; }
    .goals-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #313244; }
    .hypothesis { color: #f9e2af; margin-bottom: 2px; padding-left: 10px; }
    .goal { color: #a6e3a1; padding-left: 10px; }
    .penrose-canvas { width: 100%; height: 100%; background-color: #181825; border-radius: 4px; }
    .log-entry { font-size: 12px; margin-bottom: 2px; }
    .log-info { color: #89b4fa; }
    .log-error { color: #f38ba8; }
    .log-success { color: #a6e3a1; }
    .status-bar {
      display: flex; gap: 15px; padding: 8px 15px;
      background-color: #181825; border-top: 1px solid #313244;
      font-size: 12px; color: #6c7086;
    }
    .loading, .error {
      display: flex; justify-content: center; align-items: center;
      height: 100%; font-size: 16px;
    }
    .loading { color: #89b4fa; }
    .error { color: #f38ba8; }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #1e1e2e; }
    ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 5px; }
    .resizer {
      width: 5px;
      background-color: #313244;
      cursor: col-resize;
      user-select: none;
      transition: background-color 0.2s;
    }
    .resizer:hover {
      background-color: #89b4fa;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>TinyCIC Goal Viewer</h1>
    <div class="controls">
      <select id="file-selector">
        <option value="">-- Select a file --</option>
      </select>
      <button id="btn-reload">Reload</button>
      <button id="btn-typecheck">TypeCheck</button>
    </div>
  </div>
  <div class="main-content">
    <div class="code-panel" id="code-panel">
      <div class="panel-header">Source</div>
      <div class="code-content" id="code-content"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="info-panel">
      <div class="panel-header">Goal / Penrose / Log</div>
      <div class="info-content" id="info-content">
        <div class="sub-panel">
          <div class="sub-panel-header">Goals</div>
          <div class="sub-panel-content" id="goals-panel"></div>
        </div>
        <div class="sub-panel">
          <div class="sub-panel-header">Penrose</div>
          <div class="sub-panel-content" id="penrose-panel"></div>
        </div>
        <div class="sub-panel">
          <div class="sub-panel-header">TypeCheck Log</div>
          <div class="sub-panel-content" id="log-panel"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="status-bar" id="status-bar"></div>

  <script type="module">
    const API_BASE = '/api';
    let state = {
      fileContent: [],
      selectedLine: 0,
      declarations: [],
      availableFiles: [],
      loading: false,
      error: null,
      goals: [],
      logs: [],
      currentFile: null,
      infoLines: [],
      penroseAvailable: false
    };

    const codeContent = document.getElementById('code-content');
    const goalsPanel = document.getElementById('goals-panel');
    const penrosePanel = document.getElementById('penrose-panel');
    const logPanel = document.getElementById('log-panel');
    const statusBar = document.getElementById('status-bar');
    const fileSelector = document.getElementById('file-selector');
    const resizer = document.getElementById('resizer');
    const codePanel = document.getElementById('code-panel');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function render() {
      if (state.loading) {
        codeContent.innerHTML = '<div class="loading">Loading...</div>';
        goalsPanel.innerHTML = '<div class="loading">Loading...</div>';
        penrosePanel.innerHTML = '';
        logPanel.innerHTML = '';
        return;
      }
      if (state.error) {
        codeContent.innerHTML = `<div class="error">${escapeHtml(state.error)}</div>`;
        goalsPanel.innerHTML = `<div class="error">${escapeHtml(state.error)}</div>`;
        penrosePanel.innerHTML = '';
        logPanel.innerHTML = '';
        return;
      }

      const lines = state.fileContent.length > 0 ? state.fileContent : [''];
      let codeHtml = '';
      for (let i = 0; i < lines.length; i++) {
        const isSelected = i === state.selectedLine;
        const cls = isSelected ? 'code-line selected' : 'code-line';
        const marker = isSelected ? '>' : ' ';
        codeHtml += `<div class="${cls}" data-line="${i}">
          <span class="line-num">${String(i + 1).padStart(3)}</span>
          <span class="line-marker">${marker}</span>
          <span class="line-content">${escapeHtml(lines[i])}</span>
        </div>`;
      }
      codeContent.innerHTML = codeHtml;

      renderGoals();
      renderPenrose();
      renderLogs();

      statusBar.innerHTML = `
        <span>Line ${state.selectedLine + 1}/${state.fileContent.length}</span>
        <span>|</span>
        <span>${state.declarations.length} declarations</span>
        <span>|</span>
        <span>${state.goals.length} goals</span>
      `;
    }

    function renderGoals() {
      if (state.infoLines && state.infoLines.length > 0) {
        let html = '';
        for (const line of state.infoLines) {
          const trimmed = line.trim();
          if (trimmed === '────────────────────') {
            html += `<div style="border-top: 1px solid #313244; margin: 8px 0;"></div>`;
          } else if (trimmed.startsWith('⊢')) {
            html += `<div class="goal">${escapeHtml(line)}</div>`;
          } else if (trimmed.startsWith('let')) {
            html += `<div style="color: #f9e2af;">${escapeHtml(line)}</div>`;
          } else if (trimmed.includes(':')) {
            html += `<div class="hypothesis">${escapeHtml(line)}</div>`;
          } else {
            html += `<div style="margin-bottom: 3px; word-wrap: break-word;">${escapeHtml(line)}</div>`;
          }
        }
        goalsPanel.innerHTML = html;
      } else if (state.goals.length === 0) {
        goalsPanel.innerHTML = '<div class="info-empty">Select a line to see goals</div>';
        return;
      } else {
        let html = '';
        for (let i = 0; i < state.goals.length; i++) {
          const goal = state.goals[i];
          html += `<div style="margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #313244;">`;
          html += `<div style="color: #fab387; font-weight: bold; margin-bottom: 5px;">Goal ${i + 1}</div>`;
          if (goal.hypotheses && goal.hypotheses.length > 0) {
            html += `<div style="color: #6c7086; font-size: 11px; margin-bottom: 3px;">Hypotheses:</div>`;
            for (const hyp of goal.hypotheses) {
              html += `<div class="hypothesis">${escapeHtml(hyp)}</div>`;
            }
          }
          html += `<div style="color: #6c7086; font-size: 11px; margin-bottom: 3px; margin-top: 5px;">Goal:</div>`;
          html += `<div class="goal">${escapeHtml(goal.goal || '')}</div>`;
          html += `</div>`;
        }
        goalsPanel.innerHTML = html;
      }
    }

    // Parse geometry info from theorem line and nearby lines
    function parseGeometryInfo() {
      const lines = state.fileContent;
      const currentLine = state.selectedLine;
      
      // Find the theorem declaration
      let theoremLine = -1;
      for (let i = currentLine; i >= 0; i--) {
        const trimmed = lines[i].trim();
        if (trimmed.startsWith('theorem ') || trimmed.startsWith('def ') || trimmed.startsWith('axiom ')) {
          theoremLine = i;
          break;
        }
      }
      
      if (theoremLine === -1) return null;
      
      const declLine = lines[theoremLine].trim();
      
      // Extract theorem name and parameters
      const nameMatch = declLine.match(/(?:theorem|def|axiom)\s+(\w+)/);
      const name = nameMatch ? nameMatch[1] : '';
      
      // Extract point parameters (e.g., forall (A : Point), forall (B : Point))
      const points = [];
      const pointRegex = /\(\s*(\w+)\s*:\s*Point\s*\)/g;
      let match;
      while ((match = pointRegex.exec(declLine)) !== null) {
        points.push(match[1]);
      }
      
      // Extract line parameters
      const lineParams = [];
      const lineRegex = /\(\s*(\w+)\s*:\s*Line\s*\)/g;
      while ((match = lineRegex.exec(declLine)) !== null) {
        lineParams.push(match[1]);
      }
      
      // Determine geometry type from name and content
      let geomType = 'generic';
      const lowerName = name.toLowerCase();
      const lowerDecl = declLine.toLowerCase();
      
      if (lowerName.includes('triangle') || lowerDecl.includes('triangle')) geomType = 'triangle';
      else if (lowerName.includes('circle') || lowerDecl.includes('circle')) geomType = 'circle';
      else if (lowerName.includes('parallel') || lowerDecl.includes('parallel')) geomType = 'parallel';
      else if (lowerName.includes('perpendicular') || lowerDecl.includes('perpendicular')) geomType = 'perpendicular';
      else if (lowerName.includes('midpoint') || lowerDecl.includes('midpoint')) geomType = 'midpoint';
      else if (lowerName.includes('between') || lowerDecl.includes('between')) geomType = 'segment';
      else if (lowerName.includes('collinear') || lowerDecl.includes('collinear')) geomType = 'collinear';
      else if (lowerName.includes('rectangle') || lowerDecl.includes('rectangle')) geomType = 'rectangle';
      else if (lowerName.includes('isosceles') || lowerDecl.includes('isosceles')) geomType = 'isosceles';
      else if (lowerName.includes('equilateral') || lowerDecl.includes('equilateral')) geomType = 'equilateral';
      else if (lowerName.includes('angle') || lowerDecl.includes('angle')) geomType = 'angle';
      else if (lowerName.includes('congruent') || lowerDecl.includes('congruent')) geomType = 'congruent';
      else if (lowerName.includes('butterfly') || lowerDecl.includes('butterfly')) geomType = 'butterfly';
      else if (points.length >= 3) geomType = 'triangle';
      else if (points.length === 2) geomType = 'segment';
      
      return { name, points, lineParams, geomType, declLine };
    }

    function generatePenroseSVG(geomInfo) {
      if (!geomInfo) return '';
      
      const { name, points, lineParams, geomType } = geomInfo;
      const W = 400, H = 300;
      const margin = 40;
      
      // Helper to create point positions
      function getPointPositions(count) {
        const positions = [];
        if (count === 1) {
          positions.push({ x: W/2, y: H/2 });
        } else if (count === 2) {
          positions.push({ x: W/3, y: H/2 });
          positions.push({ x: 2*W/3, y: H/2 });
        } else if (count === 3) {
          // Triangle layout
          positions.push({ x: W/2, y: margin + 20 });
          positions.push({ x: margin + 30, y: H - margin - 20 });
          positions.push({ x: W - margin - 30, y: H - margin - 20 });
        } else if (count === 4) {
          // Quadrilateral layout
          positions.push({ x: margin + 40, y: margin + 30 });
          positions.push({ x: W - margin - 40, y: margin + 30 });
          positions.push({ x: W - margin - 40, y: H - margin - 30 });
          positions.push({ x: margin + 40, y: H - margin - 30 });
        } else if (count >= 5) {
          // Circle layout for many points
          const radius = Math.min(W, H) / 2 - margin;
          for (let i = 0; i < count; i++) {
            const angle = (2 * Math.PI * i) / count - Math.PI / 2;
            positions.push({
              x: W/2 + radius * Math.cos(angle),
              y: H/2 + radius * Math.sin(angle)
            });
          }
        }
        return positions;
      }
      
      let svg = `<svg class="penrose-canvas" viewBox="0 0 ${W} ${H}">`;
      
      // Background
      svg += `<rect width="${W}" height="${H}" fill="#181825"/>`;
      
      // Title
      svg += `<text x="${W/2}" y="20" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="bold">${escapeHtml(name)}</text>`;
      
      const pos = getPointPositions(points.length || 3);
      
      switch (geomType) {
        case 'triangle': {
          if (points.length >= 3) {
            // Draw triangle
            svg += `<polygon points="${pos[0].x},${pos[0].y} ${pos[1].x},${pos[1].y} ${pos[2].x},${pos[2].y}" fill="none" stroke="#89b4fa" stroke-width="2"/>`;
            // Draw points
            for (let i = 0; i < Math.min(3, points.length); i++) {
              svg += `<circle cx="${pos[i].x}" cy="${pos[i].y}" r="4" fill="#f38ba8"/>`;
              svg += `<text x="${pos[i].x}" y="${pos[i].y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${points[i]}</text>`;
            }
            // If isosceles, mark equal sides
            if (name.toLowerCase().includes('isosceles')) {
              svg += `<text x="${W/2}" y="${H - 10}" text-anchor="middle" fill="#a6e3a1" font-size="10">AB ≅ AC</text>`;
            }
          }
          break;
        }
        case 'circle': {
          const cx = W/2, cy = H/2, r = 80;
          svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#89b4fa" stroke-width="2"/>`;
          svg += `<circle cx="${cx}" cy="${cy}" r="4" fill="#f38ba8"/>`;
          svg += `<text x="${cx}" y="${cy - r - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">O</text>`;
          if (points.length > 0) {
            const angle = -Math.PI / 4;
            const px = cx + r * Math.cos(angle);
            const py = cy + r * Math.sin(angle);
            svg += `<circle cx="${px}" cy="${py}" r="4" fill="#a6e3a1"/>`;
            svg += `<text x="${px + 10}" y="${py}" fill="#cdd6f4" font-size="12">${points[0]}</text>`;
          }
          break;
        }
        case 'parallel': {
          const y1 = H/3, y2 = 2*H/3;
          svg += `<line x1="${margin}" y1="${y1}" x2="${W - margin}" y2="${y1}" stroke="#89b4fa" stroke-width="2"/>`;
          svg += `<line x1="${margin}" y1="${y2}" x2="${W - margin}" y2="${y2}" stroke="#89b4fa" stroke-width="2"/>`;
          svg += `<text x="${margin}" y="${y1 - 5}" fill="#cdd6f4" font-size="10">l</text>`;
          svg += `<text x="${margin}" y="${y2 - 5}" fill="#cdd6f4" font-size="10">m</text>`;
          if (points.length >= 2) {
            svg += `<text x="${W/2}" y="${H - 10}" text-anchor="middle" fill="#a6e3a1" font-size="10">l ∥ m</text>`;
          }
          break;
        }
        case 'perpendicular': {
          const cx = W/2, cy = H/2;
          svg += `<line x1="${cx}" y1="${margin + 20}" x2="${cx}" y2="${H - margin - 20}" stroke="#89b4fa" stroke-width="2"/>`;
          svg += `<line x1="${margin + 40}" y1="${cy}" x2="${W - margin - 40}" y2="${cy}" stroke="#89b4fa" stroke-width="2"/>`;
          // Right angle marker
          svg += `<rect x="${cx}" y="${cy}" width="15" height="15" fill="none" stroke="#f9e2af" stroke-width="1.5"/>`;
          svg += `<text x="${W/2}" y="${H - 10}" text-anchor="middle" fill="#a6e3a1" font-size="10">l ⊥ m</text>`;
          break;
        }
        case 'midpoint': {
          if (points.length >= 3) {
            const p1 = pos[0], p2 = pos[1], pm = pos[2];
            svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#89b4fa" stroke-width="2"/>`;
            svg += `<circle cx="${p1.x}" cy="${p1.y}" r="4" fill="#f38ba8"/>`;
            svg += `<circle cx="${p2.x}" cy="${p2.y}" r="4" fill="#f38ba8"/>`;
            svg += `<circle cx="${pm.x}" cy="${pm.y}" r="4" fill="#a6e3a1"/>`;
            svg += `<text x="${p1.x}" y="${p1.y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${points[0]}</text>`;
            svg += `<text x="${p2.x}" y="${p2.y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${points[1]}</text>`;
            svg += `<text x="${pm.x}" y="${pm.y + 20}" text-anchor="middle" fill="#a6e3a1" font-size="12">${points[2]} (midpoint)</text>`;
          }
          break;
        }
        case 'segment': {
          if (points.length >= 2) {
            svg += `<line x1="${pos[0].x}" y1="${pos[0].y}" x2="${pos[1].x}" y2="${pos[1].y}" stroke="#89b4fa" stroke-width="2"/>`;
            svg += `<circle cx="${pos[0].x}" cy="${pos[0].y}" r="4" fill="#f38ba8"/>`;
            svg += `<circle cx="${pos[1].x}" cy="${pos[1].y}" r="4" fill="#f38ba8"/>`;
            svg += `<text x="${pos[0].x}" y="${pos[0].y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${points[0]}</text>`;
            svg += `<text x="${pos[1].x}" y="${pos[1].y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${points[1]}</text>`;
          }
          break;
        }
        case 'collinear': {
          const y = H/2;
          svg += `<line x1="${margin + 20}" y1="${y}" x2="${W - margin - 20}" y2="${y}" stroke="#89b4fa" stroke-width="2"/>`;
          for (let i = 0; i < Math.min(points.length, 4); i++) {
            const x = margin + 40 + (i * (W - 2*margin - 80) / Math.min(points.length - 1, 3));
            svg += `<circle cx="${x}" cy="${y}" r="4" fill="#f38ba8"/>`;
            svg += `<text x="${x}" y="${y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${points[i]}</text>`;
          }
          svg += `<text x="${W/2}" y="${H - 10}" text-anchor="middle" fill="#a6e3a1" font-size="10">collinear points</text>`;
          break;
        }
        case 'rectangle': {
          if (points.length >= 4) {
            svg += `<polygon points="${pos[0].x},${pos[0].y} ${pos[1].x},${pos[1].y} ${pos[2].x},${pos[2].y} ${pos[3].x},${pos[3].y}" fill="none" stroke="#89b4fa" stroke-width="2"/>`;
            for (let i = 0; i < 4; i++) {
              svg += `<circle cx="${pos[i].x}" cy="${pos[i].y}" r="4" fill="#f38ba8"/>`;
              svg += `<text x="${pos[i].x}" y="${pos[i].y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${points[i]}</text>`;
            }
            // Right angle markers
            svg += `<rect x="${pos[0].x}" y="${pos[0].y}" width="12" height="12" fill="none" stroke="#f9e2af" stroke-width="1"/>`;
          }
          break;
        }
        case 'angle': {
          const cx = W/2, cy = H/2 + 20;
          svg += `<line x1="${cx}" y1="${cy}" x2="${margin + 30}" y2="${margin + 30}" stroke="#89b4fa" stroke-width="2"/>`;
          svg += `<line x1="${cx}" y1="${cy}" x2="${W - margin - 30}" y2="${margin + 30}" stroke="#89b4fa" stroke-width="2"/>`;
          svg += `<circle cx="${cx}" cy="${cy}" r="4" fill="#f38ba8"/>`;
          // Angle arc
          svg += `<path d="M ${cx - 30} ${cy} A 30 30 0 0 1 ${cx + 30} ${cy}" fill="none" stroke="#f9e2af" stroke-width="1.5"/>`;
          if (points.length >= 3) {
            svg += `<text x="${cx}" y="${cy + 25}" text-anchor="middle" fill="#a6e3a1" font-size="10">∠${points[0]}${points[1]}${points[2]}</text>`;
          }
          break;
        }
        case 'butterfly': {
          // Butterfly theorem diagram
          const cx = W/2, cy = H/2, r = 70;
          // Circle
          svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#89b4fa" stroke-width="2"/>`;
          svg += `<circle cx="${cx}" cy="${cy}" r="3" fill="#f38ba8"/>`;
          svg += `<text x="${cx}" y="${cy - r - 8}" text-anchor="middle" fill="#cdd6f4" font-size="10">O</text>`;
          // Chord PQ
          const px = cx - 50, py = cy + 40;
          const qx = cx + 50, qy = cy + 40;
          svg += `<line x1="${px}" y1="${py}" x2="${qx}" y2="${qy}" stroke="#a6e3a1" stroke-width="1.5"/>`;
          svg += `<circle cx="${px}" cy="${py}" r="3" fill="#a6e3a1"/>`;
          svg += `<circle cx="${qx}" cy="${qy}" r="3" fill="#a6e3a1"/>`;
          svg += `<text x="${px - 10}" y="${py + 5}" fill="#a6e3a1" font-size="10">P</text>`;
          svg += `<text x="${qx + 5}" y="${qy + 5}" fill="#a6e3a1" font-size="10">Q</text>`;
          // Midpoint M
          const mx = (px + qx) / 2, my = (py + qy) / 2;
          svg += `<circle cx="${mx}" cy="${my}" r="3" fill="#fab387"/>`;
          svg += `<text x="${mx}" y="${my + 15}" text-anchor="middle" fill="#fab387" font-size="10">M</text>`;
          // Chords AB and CD through M
          const ax = cx - 40, ay = cy - 50;
          const bx = cx + 40, by = cy + 50;
          const dx = cx + 40, dy = cy - 50;
          const cx2 = cx - 40, cy2 = cy + 50;
          svg += `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="#6c7086" stroke-width="1" stroke-dasharray="4"/>`;
          svg += `<line x1="${cx2}" y1="${cy2}" x2="${dx}" y2="${dy}" stroke="#6c7086" stroke-width="1" stroke-dasharray="4"/>`;
          break;
        }
        default: {
          // Generic: show points
          for (let i = 0; i < points.length; i++) {
            const p = pos[i] || { x: W/2 + (i - points.length/2) * 60, y: H/2 };
            svg += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#f38ba8"/>`;
            svg += `<text x="${p.x}" y="${p.y - 10}" text-anchor="middle" fill="#cdd6f4" font-size="12">${points[i]}</text>`;
          }
        }
      }
      
      svg += '</svg>';
      return svg;
    }

    function renderPenrose() {
      const isGeometryFile = (state.currentFile || '').toLowerCase().includes('geometry');
      
      if (!isGeometryFile) {
        penrosePanel.innerHTML = '<div class="info-empty">Penrose visualization available for geometry files</div>';
        return;
      }
      
      if (!state.penroseAvailable) {
        penrosePanel.innerHTML = '<div class="info-empty">Select a theorem line to see Penrose visualization</div>';
        return;
      }

      const geomInfo = parseGeometryInfo();
      const svg = generatePenroseSVG(geomInfo);
      
      if (svg) {
        penrosePanel.innerHTML = svg;
      } else {
        penrosePanel.innerHTML = '<div class="info-empty">Could not parse geometry information</div>';
      }
    }

    function renderLogs() {
      if (state.logs.length === 0) {
        logPanel.innerHTML = '<div class="info-empty">Click TypeCheck to run type checking</div>';
        return;
      }

      let html = '';
      for (const log of state.logs) {
        const cls = log.type === 'error' ? 'log-error' : log.type === 'success' ? 'log-success' : 'log-info';
        html += `<div class="log-entry ${cls}">${escapeHtml(log.message)}</div>`;
      }
      logPanel.innerHTML = html;
    }

    function addLog(message, type = 'info') {
      state.logs.push({ message, type });
      if (state.logs.length > 100) state.logs.shift();
      renderLogs();
    }

    function clearLogs() {
      state.logs = [];
      renderLogs();
    }

    async function loadAvailableFiles() {
      try {
        const res = await fetch(`${API_BASE}/list-files`);
        if (res.ok) {
          const data = await res.json();
          state.availableFiles = data.files || [];
          
          fileSelector.innerHTML = '<option value="">-- Select a file --</option>';
          for (const file of state.availableFiles) {
            const opt = document.createElement('option');
            opt.value = file;
            opt.textContent = file;
            fileSelector.appendChild(opt);
          }
        }
      } catch (e) {
        console.error('Failed to load file list:', e);
      }
    }

    async function loadFile(targetPath) {
      state.loading = true;
      clearLogs();
      render();

      try {
        if (targetPath) {
          const res = await fetch(`/api/file?path=${encodeURIComponent(targetPath)}`);
          if (res.ok) {
            const content = await res.text();
            state.fileContent = content.split('\n');
            state.selectedLine = 0;
            state.error = null;
            state.currentFile = targetPath;
            addLog(`Loaded file: ${targetPath}`, 'success');
          } else {
            state.error = `Cannot load file: ${targetPath}`;
            addLog(`Error loading file: ${targetPath}`, 'error');
          }

          const loadRes = await fetch(`${API_BASE}/load`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: targetPath, dependencies: [] })
          });
          if (loadRes.ok) {
            const data = await loadRes.json();
            if (data.success) {
              addLog('File loaded successfully', 'success');
            } else {
              addLog(`Warning: ${data.error || 'File may have errors'}`, 'error');
            }
          }
        } else {
          state.fileContent = [
            '-- Select a .cic file from the dropdown above',
            '',
            'Available commands:',
            '  j/k or Arrow Up/Down: Move cursor',
            '  Click on a line: Select line',
            '',
            'The Goals panel will show type information',
            'for the selected line.'
          ];
          state.error = null;
          state.currentFile = null;
        }

        const envRes = await fetch(`${API_BASE}/env`);
        if (envRes.ok) {
          const data = await envRes.json();
          state.declarations = data.declarations || [];
          addLog(`Loaded ${state.declarations.length} declarations`, 'info');
        }

        await fetchLineInfo(state.selectedLine);
      } catch (e) {
        state.error = e.message;
        addLog(`Error: ${e.message}`, 'error');
      }

      state.loading = false;
      render();
      scrollToSelected();
    }

    async function fetchLineInfo(lineNum) {
      try {
        let url = `${API_BASE}/line-info?line=${lineNum}`;
        if (state.currentFile) {
          url += `&file=${encodeURIComponent(state.currentFile)}`;
        }
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          state.goals = data.goals || [];
          state.penroseAvailable = data.penrose_available || false;
          state.infoLines = data.info || [];
          if (state.goals.length === 0 && state.infoLines.length === 0) {
            state.goals = [{
              hypotheses: [`Line ${lineNum + 1} selected`],
              goal: `Type information for line ${lineNum + 1}`
            }];
          }
        } else {
          state.goals = [];
          state.penroseAvailable = false;
          state.infoLines = [];
        }
      } catch (e) {
        state.goals = [];
        state.penroseAvailable = false;
        state.infoLines = [];
      }
    }

    async function runTypeCheck() {
      const target = fileSelector.value;
      if (!target) {
        addLog('Please select a file first', 'error');
        return;
      }

      clearLogs();
      addLog(`Running type check on: ${target}`, 'info');

      try {
        const res = await fetch(`${API_BASE}/load`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target, dependencies: [] })
        });

        if (res.ok) {
          const data = await res.json();
          if (data.success) {
            addLog('Type check passed!', 'success');
            addLog('All declarations are valid', 'success');
          } else {
            addLog(`Type check failed: ${data.error || 'Unknown error'}`, 'error');
          }
        } else {
          addLog('Failed to run type check', 'error');
        }
      } catch (e) {
        addLog(`Type check error: ${e.message}`, 'error');
      }
    }

    function scrollToSelected() {
      const el = codeContent.querySelector('.selected');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function initResizer() {
      let isResizing = false;
      
      resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        
        const containerRect = document.querySelector('.main-content').getBoundingClientRect();
        const newWidth = e.clientX - containerRect.left;
        const minWidth = 300;
        const maxWidth = containerRect.width - 300;
        
        if (newWidth > minWidth && newWidth < maxWidth) {
          codePanel.style.width = newWidth + 'px';
          codePanel.style.flex = '0 0 auto';
        }
      });
      
      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    }

    fileSelector.addEventListener('change', (e) => {
      const file = e.target.value;
      if (file) {
        const url = new URL(window.location);
        url.searchParams.set('target', file);
        window.history.pushState({}, '', url);
        loadFile(file);
      }
    });

    codeContent.addEventListener('click', async (e) => {
      const line = e.target.closest('.code-line');
      if (line) {
        state.selectedLine = parseInt(line.dataset.line);
        await fetchLineInfo(state.selectedLine);
        render();
        scrollToSelected();
      }
    });

    document.addEventListener('keydown', async (e) => {
      if (e.key === 'ArrowUp' || e.key === 'k') {
        if (state.selectedLine > 0) {
          state.selectedLine--;
          await fetchLineInfo(state.selectedLine);
          render();
          scrollToSelected();
        }
      } else if (e.key === 'ArrowDown' || e.key === 'j') {
        if (state.selectedLine < state.fileContent.length - 1) {
          state.selectedLine++;
          await fetchLineInfo(state.selectedLine);
          render();
          scrollToSelected();
        }
      }
    });

    document.getElementById('btn-reload').addEventListener('click', () => {
      const params = new URLSearchParams(window.location.search);
      const target = params.get('target');
      if (target) loadFile(target);
    });

    document.getElementById('btn-typecheck').addEventListener('click', runTypeCheck);

    loadAvailableFiles().then(() => {
      const params = new URLSearchParams(window.location.search);
      let target = params.get('target');
      
      if (!target) {
        const geometryFile = state.availableFiles.find(f => f.toLowerCase().includes('geometry'));
        if (geometryFile) {
          target = geometryFile;
          fileSelector.value = target;
        }
      } else {
        fileSelector.value = target;
      }
      
      loadFile(target);
      initResizer();
    });
  </script>
</body>
</html>
